<ion-header>
  <ion-toolbar>
    <ion-title
      ><img
        src="https://suaenergiabrasil.com.br/assets/img/logomarca03.png"
        alt="Sua Energia Brasil - Login"
    /></ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="ion-padding">
    <h1>Login</h1>
    <h2>Acesse sua conta</h2>
  </div>
  
  <form (ngSubmit)="submit()" [formGroup]="form">
    <ion-list>
      <ion-item>
        <ion-label position="stacked">Tipo de usuário</ion-label>
        <ion-select formControlName="userType" (ionChange)="userType.set($event.detail.value)">
          <ion-select-option value="consumer">Consumidor</ion-select-option>
          <ion-select-option value="supplier">Fornecedor</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">E-mail</ion-label>
        <ion-input
          autocomplete="email"
          inputmode="email"
          formControlName="email"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Senha</ion-label>
        <ion-input
          type="password"
          autocomplete="current-password"
          formControlName="password"
        ></ion-input>
      </ion-item>
    </ion-list>

    <div class="ion-padding">
      <ion-button type="submit" expand="block">
        Entrar
      </ion-button>
      
      <ion-button 
        fill="clear" 
        expand="block" 
        (click)="goToSignup()"
        style="margin-top: 1rem;"
      >
        Não tem conta? Cadastre-se
      </ion-button>
    </div>
  </form>
</ion-content>
