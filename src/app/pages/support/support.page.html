<ion-header>
  <ion-toolbar>
    <ion-title>Suporte</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Precisa de ajuda?</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p class="sub">Estamos aqui para te ajudar com a simulação e contratação.</p>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-item>
      <ion-label>
        <h2>WhatsApp</h2>
        <p>Atendimento rápido</p>
      </ion-label>
      <ion-button slot="end" fill="outline">Abrir</ion-button>
    </ion-item>

    <ion-item>
      <ion-label>
        <h2>E-mail</h2>
        <p>suporte@suaenergiabrasil.com.br</p>
      </ion-label>
      <ion-button slot="end" fill="outline">Enviar</ion-button>
    </ion-item>
  </ion-list>
</ion-content>
